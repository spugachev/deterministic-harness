# The one project-specific manifest dhx reads. Keys equal to dhx's built-in
# defaults are omitted (so `dhx config explain` shows them as "(default)").
# See: dhx config explain <gate>.

[meta]
schema_version = 1

[project]
name = "seats"

[coverage]
# The verified-core crate(s) held to the high coverage bar; everything else in
# the workspace is excluded from the report. REQUIRED.
core = ["core"]

[targets]
# Role assignments cargo metadata can't infer. The verified core is the target
# for the nightly/concurrency gates; the DST harness lives in the outer `api`
# crate (it drives the domain over a seeded simulated world).
miri = "core"
tsan = "core"
loom = "core"
dst = { crate = "api", test = "dst" }
# pins live at .harness/pins/<name>.txt by convention (no [pins] table).

# The hold lifecycle IS a state machine: model it as a pure
# `fn next(state, event) -> Option<state>` and let dhx generate the TLA+ spec
# from the Rust. Edit `domain::hold::next`, run `dhx regen`, commit the result.
[fsm]
source = "crates/core/src/domain/hold.rs"
fn_name = "next"
state_enum = "HoldState"
event_enum = "HoldEvent"
generated_stem = "Lifecycle" # → spec/tla/Lifecycle.{tla,cfg}, generated by `dhx regen`

# dhx generates the TLA+ spec from the Rust FSM and model-checks it. Each TLA+
# invariant has an anti-vacuity entry in spec/tla/mutations.toml.
